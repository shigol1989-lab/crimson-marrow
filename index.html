<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Marrow v1.0.0</title>
    <!-- Tailwind CSS (Görsel Tasarım Motoru) -->
    <script src="https://tailwindcss.com"></script>
    <style>
        /* Siber Gerilla Özel Efektleri */
        .cyber-grid {
            background-image: linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .scanline {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.3)), linear-gradient(to right, rgba(255,0,0,0.1), rgba(0,255,0,0.02), rgba(0,0,255,0.1));
            background-size: 100% 4px, 6px 100%;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-mono min-h-screen cyber-grid relative overflow-x-hidden selection:bg-red-600 selection:text-white">
    
    <div class="absolute inset-0 scanline pointer-events-none z-50 opacity-30"></div>

    <!-- Üst Menü / Terminal Header -->
    <header class="border-b border-red-900/40 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="filterCategory(null)">
                <span class="text-xl font-black tracking-widest text-red-500 animate-pulse">CRIMSON_MARROW</span>
                <span class="px-2 py-0.5 text-xs bg-red-950/60 text-red-400 border border-red-800/60 rounded font-mono">SYS_CORE_v1.0</span>
            </div>
            
            <!-- Canlı Terminal Arama Kutusu -->
            <div class="w-full sm:w-72 relative">
                <span class="absolute left-3 top-2.5 text-red-500 text-sm">&gt;</span>
                <input 
                    type="text" 
                    id="cyberSearch"
                    placeholder="Veri tabanında ara..." 
                    oninput="searchPosts()"
                    class="w-full bg-slate-950 border border-red-900/50 rounded pl-7 pr-3 py-2 text-sm focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 text-red-400 font-mono transition-all placeholder-red-900/60"
                />
            </div>
        </div>
    </header>

    <!-- Ana İçerik Alanı -->
    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- Sol Panel: Siber Sektörler -->
        <aside class="lg:col-span-1 space-y-2">
            <div class="text-[10px] font-bold text-red-500/60 uppercase tracking-widest px-3 mb-2 flex items-center justify-between">
                <span>[SEKTÖR_FİLTRESİ]</span>
                <span class="animate-ping h-1.5 w-1.5 rounded-full bg-red-500"></span>
            </div>
            
            <button 
                id="cat-all"
                onclick="filterCategory(null)"
                class="w-full text-left px-4 py-2.5 rounded text-sm transition-all flex justify-between items-center bg-red-950/30 text-red-400 border border-red-900/60 shadow-[0_0_10px_rgba(153,27,27,0.1)]"
            >
                <span>⚡ TÜM_AKIŞ</span>
                <span id="count-all" class="text-xs bg-slate-900 px-2 py-0.5 rounded border border-red-900/30 text-red-500 font-bold">0</span>
            </button>

            <button 
                id="cat-Laboratuvar"
                onclick="filterCategory('Laboratuvar')"
                class="w-full text-left px-4 py-2.5 rounded text-sm transition-all flex justify-between items-center hover:bg-slate-900/60 text-slate-400 border border-transparent"
            >
                <span class="flex items-center gap-2"><span>☣</span> Laboratuvar</span>
                <span id="count-Laboratuvar" class="text-xs bg-slate-900 px-2 py-0.5 rounded border border-slate-800 text-slate-500">0</span>
            </button>

            <button 
                id="cat-Zinden"
                onclick="filterCategory('Zinden')"
                class="w-full text-left px-4 py-2.5 rounded text-sm transition-all flex justify-between items-center hover:bg-slate-900/60 text-slate-400 border border-transparent"
            >
                <span class="flex items-center gap-2"><span>⛓</span> Zinden</span>
                <span id="count-Zinden" class="text-xs bg-slate-900 px-2 py-0.5 rounded border border-slate-800 text-slate-500">0</span>
            </button>

            <button 
                id="cat-Amnezi"
                onclick="filterCategory('Amnezi')"
                class="w-full text-left px-4 py-2.5 rounded text-sm transition-all flex justify-between items-center hover:bg-slate-900/60 text-slate-400 border border-transparent"
            >
                <span class="flex items-center gap-2"><span>⚪</span> Amnezi</span>
                <span id="count-Amnezi" class="text-xs bg-slate-900 px-2 py-0.5 rounded border border-slate-800 text-slate-500">0</span>
            </button>

            <button 
                id="cat-Vicdan"
                onclick="filterCategory('Vicdan')"
                class="w-full text-left px-4 py-2.5 rounded text-sm transition-all flex justify-between items-center hover:bg-slate-900/60 text-slate-400 border border-transparent"
            >
                <span class="flex items-center gap-2"><span>⚖</span> Vicdan</span>
                <span id="count-Vicdan" class="text-xs bg-slate-900 px-2 py-0.5 rounded border border-slate-800 text-slate-500">0</span>
            </button>
        </aside>

        <!-- Sağ Panel: Kod Günlükleri Akışı -->
        <section class="lg:col-span-3 space-y-4" id="postsContainer">
            <!-- Dosyalar JavaScript ile buraya akacak -->
        </section>
    </main>

    <!-- JavaScript Motoru -->
    <script>
        // VERİ TABANI
        const POSTS = [
            { id: "1", title: "Deney Prototipi #09", category: "Laboratuvar", excerpt: "Hücre yenilenmesi beklentinin ötesinde hızlandı ancak denek siber uyarıları reddediyor...", date: "2026-07-07" },
            { id: "2", title: "Hücre Blokları Güvenlik Raporu", category: "Zinden", excerpt: "Derin zindan koridorlarında yankılanan frekanslar yapay zekanın ana omurgasından sızıyor.", date: "2026-07-06" },
            { id: "3", title: "Hafıza Silme Protokolü", category: "Amnezi", excerpt: "Deneklerin son 48 saatlik anıları başarıyla izole edildi. Geri yükleme noktaları imha edildi.", date: "2026-07-05" },
            { id: "4", title: "Manevi Hesaplaşma Arayüzü", category: "Vicdan", excerpt: "Siber sistemlerin insan vicdanı üzerindeki baskı katsayısı %42 oranında artış gösterdi.", date: "2026-07-04" }
        ];

        let activeCategory = null;
        let activeQuery = "";

        // SAYAÇLARI GÜNCELLEME
        function updateCounters() {
            document.getElementById('count-all').innerText = POSTS.length;
            ["Laboratuvar", "Zinden", "Amnezi", "Vicdan"].forEach(cat => {
                const count = POSTS.filter(p => p.category === cat).length;
                document.getElementById(`count-${cat}`).innerText = count;
            });
        }

        // POSTLARI EKRANA BASMA FONKSİYONU
        function renderPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = "";

            const filtered = POSTS.filter(post => {
                const matchesCategory = activeCategory ? post.category === activeCategory : true;
                const matchesSearch = post.title.toLowerCase().includes(activeQuery.toLowerCase()) || 
                                      post.excerpt.toLowerCase().includes(activeQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="border border-dashed border-red-900/40 rounded bg-slate-900/20 p-12 text-center text-red-400/60 font-mono text-sm">
                        [UYARI: KRİTERLERE UYGUN VERİ KAYDI BULUNAMADI]
                    </div>
                `;
                return;
            }

            filtered.forEach(post => {
                const article = document.createElement('article');
                article.className = "border border-slate-900 bg-slate-900/30 rounded-lg p-6 hover:border-red-900/50 hover:bg-slate-900/50 transition-all duration-300 group shadow-sm";
                article.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                        <span class="text-[11px] font-bold font-mono bg-slate-950 border border-slate-800 text-red-400 px-2 py-0.5 rounded uppercase tracking-wider">
                            // ${post.category}
                        </span>
                        <span class="text-xs text-slate-600 font-mono">${post.date}</span>
                    </div>
                    <h2 class="text-lg font-bold text-slate-200 group-hover:text-red-400 transition-colors mb-2 tracking-wide">
                        ${post.title}
                    </h2>
                    <p class="text-sm text-slate-400 leading-relaxed font-mono border-l-2 border-slate-800 pl-3 group-hover:border-red-900/40 transition-all">
                        ${post.excerpt}
                    </p>
                `;
                container.appendChild(article);
            });
        }

        // KATEGORİ FİLTRELEME TETİKLEYİCİSİ
        function filterCategory(category) {
            activeCategory = category;
            
            // Buton stillerini güncelle
            const buttons = ['all', 'Laboratuvar', 'Zinden', 'Amnezi', 'Vicdan'];
            buttons.forEach(b => {
                const btn = document.getElementById(`cat-${b}`);
